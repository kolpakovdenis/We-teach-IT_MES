        }

            --bg-gradient-end: #0e1a1f;
            --glass-bg: rgba(20, 30, 38, 0.7);
            --glass-border: rgba(255, 255, 255, 0.18);
            --card-bg: rgba(22, 32, 42, 0.92);
            --text-primary: #f0f6ff;
            --text-secondary: #cfdfed;

            --star-color: #f5b042;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --header-bg: rgba(20, 30, 38, 0.75);
            --breakdown-bg: rgba(0, 0, 0, 0.28);
            --synonyms-bg: rgba(46, 139, 201, 0.2);
            --hover-scale: 1.02;
        }

        body.light-theme {
            --bg-gradient-start: #eef3fc;
            --bg-gradient-end: #dee9f2;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.12);
            --card-bg: rgba(255, 255, 255, 0.96);
            --text-primary: #1c2e3c;
            --text-secondary: #2a4a60;
            --accent-blue: #1f6f9f;
            --accent-green: #2a8b5a;
            --accent-purple: #8b5f9e;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --header-bg: rgba(255, 255, 255, 0.85);
            --breakdown-bg: rgba(0, 0, 0, 0.08);

            font-size: 16px;
            line-height: 1.5;

            backdrop-filter: blur(14px);
            border-radius: 32px;
            box-shadow: 0 8px 28px var(--shadow-color);
            border: 1px solid var(--glass-border);
        }

        .app-container {
            max-width: 880px;
            margin: 0 auto;
        }

            flex-wrap: wrap;

        .title h1 {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-blue));

        .title p {

            color: var(--text-secondary);
            margin-top: 0.3rem;
            opacity: 0.85;
        }

            font-size: 1.4rem;
            color: var(--text-primary);

            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .level-buttons {

            gap: 0.8rem;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.4rem 1rem;

            backdrop-filter: blur(4px);
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 1.2rem;
        }

        .level-btn {
            background: none;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            background: rgba(30, 40, 48, 0.7);
            transition: all 0.2s;

        .level-btn i {
            font-size: 1rem;
        }

        .level-btn.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 0 0.2rem;
        }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1.2rem;
            border-radius: 44px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            font-family: inherit;
            color: var(--text-secondary);
            flex: 1;
            text-align: center;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: transparent;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5rem;
            padding: 0.6rem 1.2rem;
            background: var(--glass-bg);
            border-radius: 60px;
            backdrop-filter: blur(8px);
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .category-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-weight: 500;
        }

        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
            margin-top: 0.6rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.6rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 12px 28px var(--shadow-color);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transform: translateY(24px) scale(0.97);
            transition: opacity 0.5s ease, transform 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.1);
            position: relative;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .card.favorite-card {
            border: 2px solid var(--star-color);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(245, 176, 66, 0.3);
        }

        .card.category-integration { border-left: 8px solid #10b981; }
        .card.category-logistics { border-left: 8px solid #f59e0b; }
        .card.category-planning { border-left: 8px solid #ef4444; }
        .card.category-adaptation { border-left: 8px solid #8b5cf6; }
        .card.category-contractor { border-left: 8px solid #ec489a; }
        .card.category-questions { border-left: 8px solid #14b8a6; }
        .card.category-business { border-left: 8px solid #f97316; }
        .card.category-it { border-left: 8px solid #06b6d4; }
        .card.category-qa { border-left: 8px solid #a855f7; } /* новый цвет для QA */

        .category-icon {
            font-size: 2rem;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 245, 0.12);
            border-radius: 28px;
            margin-bottom: 0.2rem;
        }

        .word-russian {
            font-size: 1.9rem;
            font-weight: 750;
            color: var(--text-primary);
            line-height: 1.3;
            letter-spacing: -0.01em;
        }

        .korean-block {
            margin: 0.3rem 0 0.2rem;
        }

        .word-korean {
            font-size: 1.6rem;
            font-weight: 650;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.2);
            padding: 0.25rem 1rem;
            border-radius: 28px;
            display: inline-block;
            letter-spacing: -0.3px;
        }

        .english-trans {
            font-size: 1rem;
            color: var(--accent-blue);
            margin-left: 12px;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
            font-weight: 500;
        }

        .synonyms-block {
            background: var(--synonyms-bg);
            border-radius: 28px;
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            width: fit-content;
            backdrop-filter: blur(4px);
            border-left: 3px solid var(--accent-green);
            margin-top: 0.2rem;
        }

        .synonyms-label {
            font-weight: 700;
            color: var(--accent-green);
            letter-spacing: 0.3px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .synonyms-text {
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-word;
        }

        .mnemonic-block {
            background: rgba(0, 0, 0, 0.28);
            border-left: 4px solid var(--star-color);
            padding: 0.8rem 1rem;
            border-radius: 24px;
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }

        .mnemonic-block i {
            margin-right: 10px;
            color: var(--star-color);
        }

        .example-block {
            background: rgba(0, 30, 40, 0.45);
            border-radius: 24px;
            padding: 0.8rem 1rem;
            border-left: 3px solid var(--accent-blue);

        }

            font-weight: 550;
            color: var(--text-primary);
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .example-ru {
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-style: italic;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.5rem;
        }

        .fav-btn {
            background: none;
            border: none;
            font-size: 1.9rem;
            cursor: pointer;
            color: #a0b8cc;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            padding: 0 8px;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
        }

        .fav-btn:active {
            transform: scale(0.88);
        }

        .fav-btn.active-fav {
            color: var(--star-color);
            text-shadow: 0 0 8px #ffb347;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--glass-bg);
            border-radius: 40px;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 1.8rem;
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: linear-gradient(145deg, #0b2b44, #031e30);
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .scroll-top:hover {
            transform: translateY(-5px) scale(1.03);
            background: linear-gradient(145deg, #124a6e, #052e46);
        }

        .scroll-top:active {
            transform: translateY(2px);
        }

        .chevron-big, .chevron-small {
            display: block;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chevron-big { width: 28px; height: 20px; margin-top: 2px; }
        .chevron-small { width: 20px; height: 14px; margin-bottom: 2px; }

        footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            padding: 1rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            body { padding: 0.7rem; font-size: 15px; }
            .header { flex-direction: column; align-items: stretch; padding: 1rem; }
            .title h1 { font-size: 1.5rem; }
            .level-buttons { gap: 0.5rem; padding: 0.3rem 0.8rem; }
            .level-btn { padding: 0.4rem 1rem; font-size: 0.85rem; }
            .word-russian { font-size: 1.6rem; }
            .word-korean { font-size: 1.4rem; }
            .english-trans { font-size: 0.9rem; margin-left: 6px; margin-top: 4px; }
            .card { padding: 1.2rem; gap: 0.9rem; }
            .synonyms-block { font-size: 0.85rem; width: 100%; }
            .fav-btn { width: 48px; height: 48px; font-size: 1.7rem; }
            .scroll-top { width: 56px; height: 56px; bottom: 1.2rem; right: 1rem; }
            .stats-bar { font-size: 0.75rem; }
        }
    </style>
</head>

        { id:120, ru:"Добавить информацию о единице измерения (UNITID)", ko:"측정 단위 정보(UNITID)를 추가하다", eng:"Add unit of measure info (UNITID)", level:"C1", category:"Интеграция с QA", iconCat:"fas fa-plus-circle", mnemonic:"Уточнение о добавлении UNITID в поток.", example:"통합 흐름에 측정 단위 정보(UNITID)를 추가해 주세요. → Добавьте, пожалуйста, информацию о единицах измерения в интеграционный поток.", synonyms:"" },
        { id:121, ru:"Добавить информацию о пользователе-инспекторе", ko:"검사자 정보를 추가하다", eng:"Add inspector information", level:"C1", category:"Интеграция с QA", iconCat:"fas fa-user-plus", mnemonic:"Запрос на включение данных об инспекторе.", example:"통합 흐름에 검사자 정보를 추가해 주세요. → Добавьте, пожалуйста, информацию о пользователе, который провел инспекцию.", synonyms:"" },
        { id:122, ru:"Обеспечить версионность инспекционных записей", ko:"검사 기록 버전 관리를 보장하다", eng:"Ensure versioning of inspection records", level:"C1", category:"Интеграция с QA", iconCat:"fas fa-check-double", mnemonic:"Требование к управлению версиями.", example:"검사 기록 버전 관리를 통합 흐름에 추가해 주세요. → Пожалуйста, добавьте информацию о версионности в интеграционный поток.", synonyms:"" },
        { id:123, ru:"Уточнить событие отправки", ko:"전송 이벤트를 확인하다", eng:"Clarify the sending event", level:"C1", category:"Интеграция с QA", iconCat:"fas fa-search", mnemonic:"Уточнение триггера отправки.", example:"전송 이벤트를 확인해 주세요. → Уточните, пожалуйста, событие отправки.", synonyms:"" },
        { id:124, ru:"Передать результаты по протоколу", ko:"프로토콜 단위로 결과를 전달하다", eng:"Transfer results grouped by protocol", level:"C1", category:"Интеграция с QA", iconCat:"fas fa-share-square", mnemonic:"Действие по отправке сгруппированных данных.", example:"프로토콜 단위로 결과를 전달해 주세요. → Передайте, пожалуйста, результаты в группировке по протоколу.", synonyms:"" }
    ];

    // --------------------------------------------------------------
    // ЛОГИКА ИГРЫ (без изменений, полностью совместима с новой базой)
    // --------------------------------------------------------------
    let currentLevel = "A1";
    let currentTab = "dictionary";
    let favorites = new Set();
    let isLightTheme = false;

    try {
        const storedFav = localStorage.getItem("it_kogiok_favorites");
        if(storedFav) favorites = new Set(JSON.parse(storedFav));
        const storedTheme = localStorage.getItem("it_kogiok_theme");
        if(storedTheme === "light") isLightTheme = true;
    } catch(e) {}

    function applyTheme() {
        if(isLightTheme) {
            document.body.classList.add("light-theme");
            document.getElementById("themeToggle").innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove("light-theme");
            document.getElementById("themeToggle").innerHTML = '<i class="fas fa-moon"></i>';
        }
    }
    function toggleTheme() {
        isLightTheme = !isLightTheme;
        localStorage.setItem("it_kogiok_theme", isLightTheme ? "light" : "dark");
        applyTheme();
    }
    function persistFavorites() {
        localStorage.setItem("it_kogiok_favorites", JSON.stringify([...favorites]));
    }

    const cardsContainer = document.getElementById("cardsContainer");
    const emptyMessageDiv = document.getElementById("emptyMessage");
    const cardCounterSpan = document.getElementById("cardCounter");
    const statsBar = document.getElementById("statsBar");

    function getWordsByLevel(level) {
        return wordsDB.filter(w => w.level === level);
    }
    function getFavoriteWords() {
        return wordsDB.filter(w => favorites.has(w.id));
    }
    function getCategoryStats(words) {
        const cats = {};
        words.forEach(w => { cats[w.category] = (cats[w.category] || 0) + 1; });
        return Object.entries(cats).map(([cat, cnt]) => `${cat} (${cnt})`).join(" • ");
    }

    function toggleFavorite(wordId, event) {
        event.stopPropagation();
        const btn = event.currentTarget;
        btn.style.transform = "scale(0.85)";
        setTimeout(() => { if(btn) btn.style.transform = ""; }, 150);
        if(favorites.has(wordId)) favorites.delete(wordId);
        else favorites.add(wordId);
        persistFavorites();
        renderCurrentView();
    }

    function renderCurrentView() {
        let words = (currentTab === "dictionary") ? getWordsByLevel(currentLevel) : getFavoriteWords();
        if(!words.length) {
            cardsContainer.innerHTML = '';
            emptyMessageDiv.style.display = "block";
            emptyMessageDiv.innerHTML = currentTab === "dictionary" ? "📘 В этом уровне пока нет слов, выберите другой уровень." : "⭐ Нет избранных слов. Нажмите звезду на карточке.";
            statsBar.style.display = "none";
            return;
        }
        statsBar.style.display = "flex";
        emptyMessageDiv.style.display = "none";
        document.getElementById("currentCategoryStats").innerHTML = getCategoryStats(words) || "Все категории";
        cardCounterSpan.innerText = words.length;
        renderCards(words);
    }

    function getCategoryClass(category) {
        const map = {
            "MES": "category-production", "IT": "category-it", "Интеграция": "category-integration",
            "Отслеживание": "category-logistics", "Планирование": "category-planning", "Адаптация": "category-adaptation",
            "Логистика": "category-logistics", "Подрядчики": "category-contractor", "Вопросы": "category-questions",
            "Деловые": "category-business", "Интеграция с QA": "category-qa"
        };
        return map[category] || "category-it";
    }

    function renderCards(wordsArray) {
        cardsContainer.innerHTML = "";
        wordsArray.forEach((word, idx) => {
            const isFav = favorites.has(word.id);
            const categoryClass = getCategoryClass(word.category);
            const card = document.createElement("div");
            card.className = `card ${categoryClass} ${isFav ? 'favorite-card' : ''}`;
            let synonymsHtml = '';
            if(word.synonyms && word.synonyms.trim() !== '') {
                synonymsHtml = `
                    <div class="synonyms-block">
                        <span class="synonyms-label"><i class="fas fa-exchange-alt"></i> Синонимы:</span>
                        <span class="synonyms-text">${escapeHtml(word.synonyms)}</span>
                    </div>
                `;
            }
            card.innerHTML = `
                <div class="category-icon"><i class="${word.iconCat}"></i></div>
                <div class="word-russian">${escapeHtml(word.ru)}</div>
                <div class="korean-block">
                    <span class="word-korean">${escapeHtml(word.ko)}</span>
                    ${word.eng ? `<span class="english-trans">[${escapeHtml(word.eng)}]</span>` : ''}
                </div>
                ${synonymsHtml}
                <div class="mnemonic-block"><i class="fas fa-lightbulb"></i> ${escapeHtml(word.mnemonic)}</div>
                <div class="example-block">
                    <div class="example-kr">${escapeHtml(word.example.split('→')[0])}</div>
                    <div class="example-ru">${escapeHtml(word.example.split('→')[1] || '')}</div>
                </div>
                <div class="card-footer">
                    <button class="fav-btn ${isFav ? 'active-fav' : ''}" data-id="${word.id}"><i class="fas fa-star"></i></button>
                </div>
            `;
            const favBtn = card.querySelector(".fav-btn");
            favBtn.addEventListener("click", (e) => toggleFavorite(word.id, e));
            cardsContainer.appendChild(card);
        });
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if(entry.isIntersecting) {
                    const cardEl = entry.target;
                    const allCards = Array.from(document.querySelectorAll('.card'));
                    const index = allCards.indexOf(cardEl);
                    const delay = Math.min(index * 0.05, 0.5);
                    setTimeout(() => cardEl.classList.add('visible'), delay * 1000);
                    observer.unobserve(cardEl);
                }
            });
        }, { threshold: 0.2 });
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Инициализация UI
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentTab = btn.dataset.tab;
            renderCurrentView();
        });
    });
    const levelBtns = document.querySelectorAll(".level-btn");
    levelBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            currentLevel = btn.dataset.level;
            levelBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if(currentTab === "dictionary") renderCurrentView();
            else renderCurrentView();
        });
    });
    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    applyTheme();
    document.querySelector('.level-btn[data-level="A1"]').classList.add("active");
    renderCurrentView();

    const scrollBtn = document.getElementById("scrollTopBtn");
    scrollBtn.addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }); });
    window.addEventListener("scroll", () => { if(window.scrollY > 300) scrollBtn.style.display = "flex"; else scrollBtn.style.display = "none"; });
    scrollBtn.style.display = "none";
</script>
</body>
</html>
