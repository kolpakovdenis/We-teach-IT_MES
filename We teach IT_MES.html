    ];

    // Состояние и логика
    let currentLevel = "A1";
    let currentTab = "dictionary";
    let favorites = new Set();
    let isLightTheme = false;
    
    try {
        const storedFav = localStorage.getItem("it_kogiok_favorites");
        if(storedFav) favorites = new Set(JSON.parse(storedFav));
        const storedTheme = localStorage.getItem("it_kogiok_theme");
        if(storedTheme === "light") isLightTheme = true;
    } catch(e) {}

    function applyTheme() {
        if(isLightTheme) {
            document.body.classList.add("light-theme");
            document.getElementById("themeToggle").innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove("light-theme");
            document.getElementById("themeToggle").innerHTML = '<i class="fas fa-moon"></i>';
        }
    }
    
    function toggleTheme() {
        isLightTheme = !isLightTheme;
        localStorage.setItem("it_kogiok_theme", isLightTheme ? "light" : "dark");
        applyTheme();
    }

    function persistFavorites() {
        localStorage.setItem("it_kogiok_favorites", JSON.stringify([...favorites]));
    }

    const cardsContainer = document.getElementById("cardsContainer");
    const emptyMessageDiv = document.getElementById("emptyMessage");
    const statsBar = document.getElementById("statsBar");
    const cardCounterSpan = document.getElementById("cardCounter");

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentTab = btn.dataset.tab;
            renderCurrentView();
        });
    });

    const levelBtns = document.querySelectorAll(".level-btn");
    levelBtns.forEach(btn => {
        btn.addEventListener("click", () => {
            currentLevel = btn.dataset.level;
            levelBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.body.classList.remove("level-A1", "level-B1", "level-C1");
            document.body.classList.add(`level-${currentLevel}`);
            if(currentTab === "dictionary") renderCurrentView();
            else renderCurrentView();
        });
    });

    document.getElementById("themeToggle").addEventListener("click", toggleTheme);
    applyTheme();

    function getWordsByLevel(level) {
        return wordsDB.filter(w => w.level === level);
    }
    function getFavoriteWords() {
        return wordsDB.filter(w => favorites.has(w.id));
    }

    function getCategoryStats(words) {
        const cats = {};
        words.forEach(w => { cats[w.category] = (cats[w.category] || 0) + 1; });
        return Object.entries(cats).map(([cat, cnt]) => `${cat} (${cnt})`).join(" • ");
    }

    function toggleFavorite(wordId, event) {
        event.stopPropagation();
        if(favorites.has(wordId)) favorites.delete(wordId);
        else favorites.add(wordId);
        persistFavorites();
        renderCurrentView();
    }

    function renderCurrentView() {
        let words = [];
        if(currentTab === "dictionary") words = getWordsByLevel(currentLevel);
        else words = getFavoriteWords();

        if(!words.length) {
            cardsContainer.innerHTML = '';
            emptyMessageDiv.style.display = "block";
            emptyMessageDiv.innerHTML = currentTab === "dictionary" ? "📘 В этом уровне нет слов, выберите другой." : "⭐ Нет избранных слов. Нажмите звезду на карточке.";
            statsBar.style.display = "none";
            return;
        }
        statsBar.style.display = "flex";
        emptyMessageDiv.style.display = "none";
        
        const categoryStatsText = getCategoryStats(words);
        document.getElementById("currentCategoryStats").innerHTML = categoryStatsText || "Все категории";
        cardCounterSpan.innerText = words.length;
        
        renderCards(words);
    }

    function getCategoryClass(category) {
        const map = {
            "MES": "category-production", "IT": "category-it", "Интеграция": "category-integration",
            "Отслеживание": "category-logistics", "Планирование": "category-planning", "Адаптация": "category-adaptation",
            "Логистика": "category-logistics", "Подрядчики": "category-contractor", "Вопросы": "category-questions", "Деловые": "category-business"
        };
        return map[category] || "category-it";
    }

    function renderBreakdown(breakdown) {
        if (!breakdown) return '';
        let componentsHtml = '';
        if (breakdown.components && breakdown.components.length) {
            componentsHtml = breakdown.components.map(c => `
                <div class="breakdown-item">
                    <span class="breakdown-emoji">${c.emoji}</span>
                    <span class="breakdown-root">${escapeHtml(c.root)}</span>
                    <span class="breakdown-arrow">←</span>
                    <span class="breakdown-ref">${escapeHtml(c.ref)}</span>
                    <span class="breakdown-meaning">(${escapeHtml(c.meaning)})</span>
                </div>
            `).join('');
        }
        return `
            <div class="breakdown-block">
                <div class="breakdown-title"><i class="fas fa-puzzle-piece"></i> РАЗБОР СЛОВА: ${escapeHtml(breakdown.title)}</div>
                <div class="breakdown-divider"></div>
                ${componentsHtml}
                <div class="breakdown-logic">
                    <div class="logic-label"><i class="fas fa-lightbulb"></i> Логика запоминания:</div>
                    <div class="logic-text">${escapeHtml(breakdown.logic)}</div>
                </div>
            </div>
        `;
    }

    function renderExtraInfo(word) {
        let html = `<div class="extra-info">`;
        if (word.synonyms) html += `<div class="extra-info-item"><span class="extra-info-label"><i class="fas fa-exchange-alt"></i> Синонимы</span><div class="extra-info-value">${escapeHtml(word.synonyms)}</div></div>`;
        if (word.relatedWords) html += `<div class="extra-info-item"><span class="extra-info-label"><i class="fas fa-link"></i> Связанные слова</span><div class="extra-info-value">${escapeHtml(word.relatedWords)}</div></div>`;
        if (word.formality) html += `<div class="extra-info-item"><span class="extra-info-label"><i class="fas fa-briefcase"></i> Формальность</span><div class="extra-info-value">${escapeHtml(word.formality === "공식적" ? "📋 Официальный" : "💬 Неофициальный")}</div></div>`;
        if (word.partOfSpeech) html += `<div class="extra-info-item"><span class="extra-info-label"><i class="fas fa-language"></i> Часть речи</span><div class="extra-info-value">${escapeHtml(word.partOfSpeech === "명사" ? "명사 (существительное)" : word.partOfSpeech)}</div></div>`;
        if (word.extra) html += `<div class="extra-info-item"><span class="extra-info-label"><i class="fas fa-info-circle"></i> Дополнительно</span><div class="extra-info-value">${escapeHtml(word.extra)}</div></div>`;
        html += `</div>`;
        return html;
    }

    function renderCards(wordsArray) {
        cardsContainer.innerHTML = "";
        wordsArray.forEach((word, idx) => {
            const isFav = favorites.has(word.id);
            const categoryClass = getCategoryClass(word.category);
            const card = document.createElement("div");
            card.className = `card ${categoryClass} ${isFav ? 'favorite-card' : ''}`;
            card.innerHTML = `
                <div class="category-icon"><i class="${word.iconCat}"></i></div>
                <div class="word-russian">${escapeHtml(word.ru)}</div>
                <div class="korean-block">
                    <span class="word-korean">${escapeHtml(word.ko)}</span>
                    <span class="english-trans">[${escapeHtml(word.eng)}]</span>
                </div>
                <div class="mnemonic-block"><i class="fas fa-lightbulb"></i> ${escapeHtml(word.mnemonic)}</div>
                <div class="example-block">
                    <div class="example-kr">${escapeHtml(formatExampleKorean(word.example))}</div>
                    <div class="example-ru">${escapeHtml(formatExampleRussian(word.example))}</div>
                </div>
                ${renderBreakdown(word.breakdown)}
                ${renderExtraInfo(word)}
                <div class="card-footer">
                    <button class="fav-btn ${isFav ? 'active-fav' : ''}" data-id="${word.id}"><i class="fas fa-star"></i></button>
                </div>
            `;
            const favBtn = card.querySelector(".fav-btn");
            favBtn.addEventListener("click", (e) => toggleFavorite(word.id, e));
            cardsContainer.appendChild(card);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if(entry.isIntersecting) {
                    const card = entry.target;
                    const allCards = Array.from(document.querySelectorAll('.card'));
                    const index = allCards.indexOf(card);
                    const delay = Math.min(index * 0.04, 0.4);
                    setTimeout(() => card.classList.add('visible'), delay * 1000);
                    observer.unobserve(card);
                }
            });
        }, { threshold: 0.15 });
        document.querySelectorAll('.card').forEach(c => observer.observe(c));
    }

    function formatExampleKorean(example) {
        if(!example) return "";
        const parts = example.split("→");
        return parts[0].trim();
    }
    function formatExampleRussian(example) {
        if(!example) return "";
        const parts = example.split("→");
        if(parts.length > 1) return parts[1].trim();
        return "";
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    const scrollBtn = document.getElementById("scrollTopBtn");
    scrollBtn.addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }); });
    window.addEventListener("scroll", () => { if(window.scrollY > 300) scrollBtn.style.display = "flex"; else scrollBtn.style.display = "none"; });
    scrollBtn.style.display = "none";

    document.querySelector('.level-btn[data-level="A1"]').classList.add("active");
    document.body.classList.add("level-A1");
    renderCurrentView();
</script>
</body>
</html>
